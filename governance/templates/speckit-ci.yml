name: Spec-Kit CI Gates

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

concurrency:
  group: speckit-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  speckit-gates:
    name: Spec-Kit Phase Gates
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure npm for GitHub Packages
        run: |
          echo "@lishavarughese-private:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.NPM_TOKEN }}" >> .npmrc

      - name: Install dependencies
        run: npm ci

      - name: Run gate evaluation
        id: gates
        run: |
          mkdir -p ci-reports
          node scripts/speckit.js gate --auto --html 2>&1
          echo "EXIT_CODE=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload CI reports as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: speckit-ci-reports
          path: |
            ci-reports/
            ci-reports-tmp/
          retention-days: 90

      - name: Post gate report as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = require("path");
            const reportsDir = "ci-reports-tmp";
            let jsonContent = null;
            let phaseName = "";
            for (const phase of ["IMPL", "TASKS", "PLAN", "SPEC"]) {
              const j = path.join(reportsDir, phase + "-gate-report-latest.json");
              if (fs.existsSync(j)) {
                jsonContent = JSON.parse(fs.readFileSync(j, "utf8"));
                phaseName = phase;
                break;
              }
            }
            if (!jsonContent) {
              console.log("No gate report found");
              return;
            }
            const hardResult = jsonContent.transition_allowed ? "PASS" : "FAIL";
            const hIcon = hardResult === "PASS" ? "\u2705" : "\u26D4";
            const s = jsonContent.summary || {};
            const gates = jsonContent.gates || [];
            const failedGates = gates.filter(g => g.result === "FAIL");
            let body = "## 🏛️ Spec-Kit Gate Report\n\n";
            body += "### " + hIcon + " **" + phaseName + " Phase**: " + hardResult + "\n";
            body += "> " + (s.passed || 0) + "/" + (s.total_gates || 0) + " gates passed | " +
              (s.hard_failures || 0) + " HARD failures | " +
              (s.soft_warnings || 0) + " SOFT warnings\n\n";
            body += "| Severity | Passed | Failed |\n";
            body += "|----------|--------|--------|\n";
            body += "| HARD | " + gates.filter(g => g.severity === "HARD" && g.result === "PASS").length + " | " +
              gates.filter(g => g.severity === "HARD" && g.result === "FAIL").length + " |\n";
            body += "| SOFT | " + gates.filter(g => g.severity === "SOFT" && g.result === "PASS").length + " | " +
              gates.filter(g => g.severity === "SOFT" && g.result === "FAIL").length + " |\n";
            body += "| INFO | " + gates.filter(g => g.severity === "INFO" && g.result === "PASS").length + " | 0 |\n\n";
            if (failedGates.length > 0) {
              body += "**Failed gates:**\n\n";
              body += "| Gate | Severity | Reason |\n";
              body += "|------|----------|--------|\n";
              failedGates.forEach(g => {
                body += "| `" + (g.gate || "") + "` | " + (g.severity || "") + " | " + (g.reason || "") + " |\n";
              });
              body += "\n";
            }
            body += "---\n";
            body += hardResult === "PASS"
              ? "### ✅ All gates passed - this PR is ready to merge.\n"
              : "### ⛔ Merge BLOCKED - fix hard gate failures and push again.\n";
            body += "\n📄 [View full HTML report](" +
              "https://github.com/" + context.repo.owner + "/" + context.repo.repo +
              "/actions/runs/" + context.runId + ")\n\n";
            body += "*Generated by Spec-Kit CI*";
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number
            });
            const existing = comments.find(c => c.body.includes("Spec-Kit Gate Report"));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }

      - name: Fail job if hard gate failed
        if: steps.gates.outputs.EXIT_CODE != '0'
        run: |
          echo "⛔ Spec-Kit CI hard gate FAILED. Merge is blocked."
          exit 1